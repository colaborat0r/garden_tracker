name: garden_harvest_tracker
description: Offline-first Garden & Harvest Tracker for homesteaders.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  drift: ^2.21.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.26

  # Navigation & UI
  go_router: ^14.2.0
  fl_chart: ^0.70.0
  dynamic_color: ^1.7.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.4
  share_plus: ^10.0.0
  permission_handler: ^11.3.1
  csv: ^6.0.0
  pdf: ^3.11.1
  printing: ^5.12.0
  image_picker: ^1.1.2
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.12
  drift_dev: ^2.21.0
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  web:
    generate: false
  windows:
    generate: false

